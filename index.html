<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabru Badminton</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root{
    --ink:#1b1410;
    --paper:#faf3e8;
    --card:#fffdf9;
    --court-green:#1f6f4a;
    --court-green-dark:#154f34;
    --shuttle-white:#fefefe;
    --tandoori:#c9522b;
    --tandoori-dark:#a13e1e;
    --gold:#e0a638;
    --beer:#f0b429;
    --line:#e7dcc8;
    --muted:#8a7d6a;
  }

  body{
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: linear-gradient(180deg, var(--court-green-dark) 0%, var(--court-green) 260px, var(--paper) 260px);
    min-height:100vh;
    padding:20px 16px 60px;
    color:var(--ink);
  }

  .container{ max-width:820px; margin:0 auto; }

  /* ---------- HEADER ---------- */
  .header{
    text-align:center;
    padding:22px 16px 30px;
    position:relative;
  }
  .header .court-lines{
    position:absolute; inset:0; overflow:hidden; pointer-events:none; opacity:0.15;
  }
  .header h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:40px;
    font-weight:700;
    color:#fff;
    letter-spacing:-0.5px;
    display:flex; align-items:center; justify-content:center; gap:12px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header .shuttle-icon{ font-size:38px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .header .tagline{
    margin-top:10px;
    font-size:14.5px;
    font-style:italic;
    color:#fff6e5;
    font-weight:600;
    letter-spacing:0.2px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.35);
  }
  .sync-status{
    margin-top:8px;
    font-size:11.5px;
    color:#fff6e5;
    opacity:0.5;
    transition:opacity .3s;
    font-weight:600;
  }

  /* ---------- INPUT BAR ---------- */
  .input-bar{
    background:var(--card);
    border-radius:14px;
    padding:14px;
    margin:-10px auto 22px;
    max-width:520px;
    box-shadow:0 12px 30px rgba(21,79,52,0.25);
    display:flex; gap:8px;
    border:1px solid var(--line);
  }
  .input-bar input{
    flex:1;
    padding:11px 14px;
    border:2px solid var(--line);
    border-radius:9px;
    font-size:15px;
    font-family:inherit;
    background:#fff;
    transition:border-color .2s;
  }
  .input-bar input:focus{ outline:none; border-color:var(--tandoori); }
  .input-bar button{
    padding:11px 18px;
    background:var(--tandoori);
    color:#fff;
    border:none;
    border-radius:9px;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    transition:background .2s;
    white-space:nowrap;
  }
  .input-bar button:hover{ background:var(--tandoori-dark); }

  /* ---------- MONTH NAV ---------- */
  .month-navigation{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:16px;
    background:var(--card);
    padding:14px 18px;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.08);
    border:1px solid var(--line);
  }
  .month-nav-btn{
    background:var(--paper);
    border:1px solid var(--line);
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    color:var(--court-green-dark);
    transition:all .2s;
    font-size:13px;
  }
  .month-nav-btn:hover{ background:var(--gold); border-color:var(--gold); color:#fff; }
  .month-title{
    font-size:19px; font-weight:700; color:var(--ink);
    font-family: Georgia, serif;
  }

  /* ---------- CALENDAR ---------- */
  .calendar{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 34px rgba(0,0,0,0.12);
    border:1px solid var(--line);
    margin-bottom:20px;
  }
  .weekday-header{
    display:grid; grid-template-columns:repeat(7,1fr);
    background: var(--court-green-dark);
  }
  .weekday{
    padding:12px 6px;
    text-align:center;
    font-weight:700;
    font-size:11.5px;
    color:#fff;
    text-transform:uppercase;
    letter-spacing:0.8px;
  }
  .days-grid{
    display:grid; grid-template-columns:repeat(7,1fr);
    gap:6px;
    padding:8px;
    background: var(--paper);
  }

  .day-cell{
    aspect-ratio:1;
    display:flex; flex-direction:column;
    padding:6px 6px 8px;
    border-radius:9px;
    background:#fff;
    border:1px solid var(--line);
    position:relative;
    min-height:78px;
    overflow:hidden;
  }
  .day-cell.other-month{
    background:transparent;
    border-color:transparent;
    opacity:0.35;
  }
  .day-cell.other-month .day-number{ color:var(--muted); }

  /* faded motif for non-session days */
  .day-cell .bg-motif{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    opacity:0.22;
    pointer-events:none;
    transform:rotate(-8deg);
  }

  .day-cell.session{
    background: linear-gradient(150deg, #ffffff 0%, #fbf0da 100%);
    border:2px solid var(--gold);
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
  }
  .day-cell.session:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 18px rgba(224,166,56,0.35);
  }
  .day-cell.session.attending{
    background: linear-gradient(150deg, #e5f6ec 0%, #c9ecd7 100%);
    border-color: var(--court-green);
  }

  .day-number{
    font-weight:700; font-size:13px; color:var(--ink); z-index:1;
  }
  .day-label{
    font-size:9.5px; color:var(--muted); font-weight:600;
    text-transform:uppercase; letter-spacing:0.4px; z-index:1;
  }
  .session-tag{
    font-size:16px; margin-top:2px; z-index:1;
  }
  .attendee-count{
    font-size:10.5px; font-weight:700; color:var(--tandoori);
    margin-top:auto; z-index:1;
  }
  .day-cell.session.attending .attendee-count{ color:var(--court-green-dark); }

  .checkmark{
    position:absolute; top:4px; right:4px;
    width:18px; height:18px;
    background:var(--court-green);
    color:#fff; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700;
    opacity:0; transition:opacity .2s;
    z-index:2;
  }
  .day-cell.session.attending .checkmark{ opacity:1; }

  /* ---------- MODAL ---------- */
  .session-modal{
    display:none; position:fixed; inset:0;
    background:rgba(27,20,16,0.55);
    z-index:1000; align-items:center; justify-content:center; padding:16px;
    backdrop-filter: blur(2px);
  }
  .session-modal.open{ display:flex; }
  .modal-content{
    background:var(--card);
    border-radius:16px;
    padding:26px;
    max-width:400px; width:100%;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
    border:1px solid var(--line);
  }
  .modal-header{
    margin-bottom:4px; font-size:19px; font-weight:700; color:var(--ink);
    font-family:Georgia, serif;
  }
  .modal-sub{
    font-size:12.5px; color:var(--muted); margin-bottom:16px; font-style:italic;
  }
  .modal-attendees{ list-style:none; margin-bottom:20px; max-height:190px; overflow-y:auto; }
  .modal-attendees li{
    padding:9px 12px; background:var(--paper); border-radius:7px; margin-bottom:7px;
    font-size:14px; color:var(--ink); display:flex; align-items:center; gap:8px;
  }
  .modal-attendees li::before{ content:"✓"; color:var(--court-green); font-weight:700; font-size:15px; }
  .modal-empty{ color:var(--muted); font-size:13.5px; font-style:italic; padding:18px 0; text-align:center; }
  .modal-buttons{ display:flex; gap:8px; }
  .modal-btn{ flex:1; padding:12px; border:none; border-radius:9px; font-weight:700; font-size:14px; cursor:pointer; transition:all .2s; }
  .modal-btn.confirm{ background:var(--court-green); color:#fff; }
  .modal-btn.confirm:hover{ background:var(--court-green-dark); }
  .modal-btn.cancel-attend{ background:var(--tandoori); color:#fff; }
  .modal-btn.cancel-attend:hover{ background:var(--tandoori-dark); }
  .modal-btn.close{ background:var(--line); color:var(--ink); }
  .modal-btn.close:hover{ background:#ddd0b5; }

  /* ---------- LEGEND ---------- */
  .legend{
    margin-top:20px; background:var(--card); padding:16px 20px;
    border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.08); border:1px solid var(--line);
  }
  .legend h3{
    font-size:11.5px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.6px; margin-bottom:10px;
  }
  .legend-items{ display:flex; gap:18px; flex-wrap:wrap; font-size:12.5px; }
  .legend-item{ display:flex; align-items:center; gap:7px; }
  .legend-dot{ width:14px; height:14px; border-radius:4px; }
  .legend-dot.session{ background:#fbf0da; border:2px solid var(--gold); }
  .legend-dot.attending{ background:#c9ecd7; border:2px solid var(--court-green); }

  /* ---------- CONTROLS ---------- */
  .controls{
    display:flex; gap:8px; background:var(--card); padding:14px;
    border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.08); margin-top:14px;
    border:1px solid var(--line);
  }
  .control-btn{
    flex:1; padding:11px 14px; border:none; border-radius:8px;
    font-weight:700; font-size:12.5px; cursor:pointer; transition:all .2s;
  }
  .control-btn.export{ background:var(--paper); color:var(--court-green-dark); border:1px solid var(--line); }
  .control-btn.export:hover{ background:#f0e6d0; }
  .control-btn.clear{ background:#fbe3dc; color:var(--tandoori-dark); }
  .control-btn.clear:hover{ background:#f6cdbf; }

  .footer-note{
    text-align:center; color:var(--tandoori-dark); font-size:13px; margin-top:24px; opacity:1; font-style:italic; font-weight:600;
  }

  @media (max-width:600px){
    .header h1{ font-size:29px; }
    .header .shuttle-icon{ font-size:28px; }
    .input-bar{ flex-direction:column; }
    .day-cell{ min-height:64px; }
    .day-number{ font-size:11.5px; }
    .day-label{ font-size:8.5px; }
    .session-tag{ font-size:13px; }
    .attendee-count{ font-size:9px; }
    .modal-content{ max-width:90vw; }
  }

  @media (prefers-reduced-motion: reduce){ * { transition:none !important; } }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1><span class="shuttle-icon">🏸</span> Gabru Badminton</h1>
    <p class="tagline">The Chole Bhature is Real, The Attendance is Fiction</p>
    <p id="syncStatus" class="sync-status">🔄 Syncing…</p>
  </div>

  <div class="input-bar">
    <input type="text" id="nameInput" placeholder="Enter your name" autocomplete="off">
    <button onclick="saveName()">Save Name</button>
  </div>

  <div class="month-navigation">
    <button class="month-nav-btn" id="prevBtn" onclick="previousMonth()">← Previous</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="month-nav-btn" id="nextBtn" onclick="nextMonth()">Next →</button>
  </div>

  <div class="calendar">
    <div class="weekday-header">
      <div class="weekday">Sun</div><div class="weekday">Mon</div><div class="weekday">Tue</div>
      <div class="weekday">Wed</div><div class="weekday">Thu</div><div class="weekday">Fri</div><div class="weekday">Sat</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="legend">
    <h3>Legend</h3>
    <div class="legend-items">
      <div class="legend-item"><div class="legend-dot session"></div><span>🏸 Session available</span></div>
      <div class="legend-item"><div class="legend-dot attending"></div><span>✓ You're in</span></div>
    </div>
  </div>

  <div class="controls">
    <button class="control-btn export" onclick="exportData()">📥 Export Data</button>
    <button class="control-btn clear" onclick="clearAllData()">🗑️ Reset Group Data</button>
  </div>

  <p class="footer-note">🍛 🌮 🍺 - the real MVPs of every session</p>
</div>

<div class="session-modal" id="sessionModal">
  <div class="modal-content">
    <div class="modal-header" id="modalDate"></div>
    <div class="modal-sub">Tuesday &amp; Thursday court sessions</div>
    <div id="modalAttendees"></div>
    <div class="modal-buttons">
      <button class="modal-btn confirm" id="toggleAttendBtn" onclick="toggleAttendance()">Join</button>
      <button class="modal-btn close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
/* ============ DATE HELPERS (timezone-safe, local calendar dates only) ============ */
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function dateKey(y, m, d){ return `${y}-${pad(m+1)}-${pad(d)}`; } // m is 0-indexed
function keyFromDate(dt){ return dateKey(dt.getFullYear(), dt.getMonth(), dt.getDate()); }

const START_YEAR = 2026, START_MONTH = 6, START_DAY = 1; // July 1, 2026 (month 0-indexed)
let currentDate = new Date(START_YEAR, START_MONTH, 1);
let selectedSessionKey = null;
let attendanceCache = {};   // shared data, synced from server
let isSyncing = false;

/* Build the set of all Tue/Thu session keys from start date for ~14 months, using local dates only (no UTC conversion) */
function generateSessions(){
  const sessions = new Set();
  let y = START_YEAR, m = START_MONTH, d = START_DAY;
  let cursor = new Date(y, m, d);
  const end = new Date(y + 1, m + 2, 1); // ~14 months window
  while (cursor < end){
    const day = cursor.getDay(); // 0=Sun..6=Sat, local
    if (day === 2 || day === 4){ // Tue or Thu
      sessions.add(keyFromDate(cursor));
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return sessions;
}
const SESSIONS = generateSessions();

const FOOD_MOTIFS = ['🍛','🌮','🍺','🏸'];
function motifForDay(day){
  return FOOD_MOTIFS[day % FOOD_MOTIFS.length];
}

function formatLongDate(y,m,d){
  const dt = new Date(y,m,d);
  return dt.toLocaleDateString('en-AU', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

/* ============ SHARED SERVER STORAGE (all gabrus see the same data) ============ */
const API_URL = '/api/attendance';

async function fetchAttendance(){
  setSyncStatus('syncing');
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('Failed to fetch');
    attendanceCache = await res.json();
    setSyncStatus('synced');
  } catch (err) {
    console.error('Sync error:', err);
    setSyncStatus('error');
  }
  return attendanceCache;
}

async function postAttendance(sessionKey, name, action){
  setSyncStatus('syncing');
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionKey, name, action })
    });
    if (!res.ok) throw new Error('Failed to update');
    attendanceCache = await res.json();
    setSyncStatus('synced');
  } catch (err) {
    console.error('Update error:', err);
    setSyncStatus('error');
    alert('Could not save - check your connection and try again.');
  }
  return attendanceCache;
}

function setSyncStatus(state){
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (state === 'syncing'){
    el.textContent = '🔄 Syncing…';
    el.style.opacity = '1';
  } else if (state === 'synced'){
    el.textContent = '✓ Synced with group';
    el.style.opacity = '0.85';
    setTimeout(() => { if (el.textContent === '✓ Synced with group') el.style.opacity = '0.5'; }, 2000);
  } else if (state === 'error'){
    el.textContent = '⚠ Sync failed - retrying…';
    el.style.opacity = '1';
  }
}

/* ============ LOCAL: just remembers this device's name ============ */
function loadName(){ return localStorage.getItem('badmintonName') || ''; }
function saveName(){
  const name = document.getElementById('nameInput').value.trim();
  if (!name){ alert('Please enter your name'); return; }
  localStorage.setItem('badmintonName', name);
  renderCalendar();
}

/* ============ NAVIGATION ============ */
function previousMonth(){ currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1); renderCalendar(); }
function nextMonth(){ currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1); renderCalendar(); }

/* ============ RENDER ============ */
function renderCalendar(){
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById('monthTitle').textContent =
    currentDate.toLocaleDateString('en-AU', { month:'long', year:'numeric' });

  const firstDayDow = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const currentName = loadName();

  // Previous month spillover
  for (let i = firstDayDow - 1; i >= 0; i--){
    const day = daysInPrevMonth - i;
    grid.appendChild(makeCell(day, true));
  }

  // Current month
  for (let day = 1; day <= daysInMonth; day++){
    const key = dateKey(year, month, day);
    const dow = new Date(year, month, day).getDay();
    const isSession = SESSIONS.has(key);
    const attendees = attendanceCache[key] || [];
    const isAttending = !!currentName && attendees.includes(currentName);
    grid.appendChild(makeCell(day, false, isSession, attendees, isAttending, key, dow));
  }

  // Next month spillover to fill 6 rows
  const used = grid.children.length;
  const remaining = 42 - used;
  for (let day = 1; day <= remaining; day++){
    grid.appendChild(makeCell(day, true));
  }
}

function makeCell(day, isOtherMonth, isSession, attendees, isAttending, sessionKey, dow){
  const cell = document.createElement('div');
  cell.className = 'day-cell';

  if (isOtherMonth){
    cell.classList.add('other-month');
    const num = document.createElement('div');
    num.className = 'day-number';
    num.textContent = day;
    cell.appendChild(num);
    return cell;
  }

  const dayNum = document.createElement('div');
  dayNum.className = 'day-number';
  dayNum.textContent = day;
  cell.appendChild(dayNum);

  if (isSession){
    cell.classList.add('session');
    if (isAttending) cell.classList.add('attending');

    const label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = dow === 2 ? 'Tue' : 'Thu';
    cell.appendChild(label);

    const tag = document.createElement('div');
    tag.className = 'session-tag';
    tag.textContent = '🏸';
    cell.appendChild(tag);

    const count = document.createElement('div');
    count.className = 'attendee-count';
    count.textContent = `${attendees.length} ${attendees.length === 1 ? 'gabru' : 'gabrus'}`;
    cell.appendChild(count);

    const check = document.createElement('div');
    check.className = 'checkmark';
    check.textContent = '✓';
    cell.appendChild(check);

    cell.onclick = () => openModal(sessionKey, attendees);
  } else {
    // faded background motif for empty/non-session days
    const motif = document.createElement('div');
    motif.className = 'bg-motif';
    motif.textContent = motifForDay(day);
    cell.appendChild(motif);
  }

  return cell;
}

/* ============ MODAL ============ */
function openModal(sessionKey, attendees){
  selectedSessionKey = sessionKey;
  const [y,m,d] = sessionKey.split('-').map(Number);
  const currentName = loadName();
  const isAttending = attendees.includes(currentName);

  document.getElementById('modalDate').textContent = formatLongDate(y, m-1, d);

  const attendeesDiv = document.getElementById('modalAttendees');
  attendeesDiv.innerHTML = attendees.length
    ? '<ul class="modal-attendees">' + attendees.map(n => `<li>${n}</li>`).join('') + '</ul>'
    : '<div class="modal-empty">No confirmations yet. Be the first gabru!</div>';

  const btn = document.getElementById('toggleAttendBtn');
  btn.textContent = isAttending ? 'Cancel attendance' : 'Join';
  btn.classList.toggle('confirm', !isAttending);
  btn.classList.toggle('cancel-attend', isAttending);
  btn.disabled = false;

  document.getElementById('sessionModal').classList.add('open');
}
function closeModal(){
  document.getElementById('sessionModal').classList.remove('open');
  selectedSessionKey = null;
}
async function toggleAttendance(){
  const currentName = loadName();
  if (!currentName){ alert('Please enter your name first'); return; }

  const attendees = attendanceCache[selectedSessionKey] || [];
  const isAttending = attendees.includes(currentName);
  const action = isAttending ? 'leave' : 'join';

  const btn = document.getElementById('toggleAttendBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  await postAttendance(selectedSessionKey, currentName, action);

  closeModal();
  renderCalendar();
}

/* ============ EXPORT / CLEAR ============ */
function exportData(){
  const sessions = Array.from(SESSIONS).sort();

  const csv = [['Date','Day','Confirmed Attendees'].join(',')];
  sessions.forEach(key => {
    const [y,m,d] = key.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const attendees = attendanceCache[key] || [];
    csv.push([
      dt.toLocaleDateString('en-AU', { year:'numeric', month:'short', day:'numeric' }),
      dt.toLocaleDateString('en-AU', { weekday:'short' }),
      attendees.join('; ')
    ].join(','));
  });

  const blob = new Blob([csv.join('\n')], { type:'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gabru-badminton-attendance-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  window.URL.revokeObjectURL(url);
}
function clearAllData(){
  alert('Group attendance data can only be cleared by the organizer directly in Netlify (Blobs store), to avoid one person accidentally wiping everyone\\'s RSVPs.');
}

/* ============ INIT ============ */
document.addEventListener('DOMContentLoaded', async () => {
  const savedName = loadName();
  if (savedName) document.getElementById('nameInput').value = savedName;

  await fetchAttendance();
  renderCalendar();

  document.getElementById('sessionModal').addEventListener('click', (e) => {
    if (e.target.id === 'sessionModal') closeModal();
  });

  // Poll for updates every 15s so the group sees each other's changes without refreshing
  setInterval(async () => {
    if (document.getElementById('sessionModal').classList.contains('open')) return; // don't yank data mid-action
    await fetchAttendance();
    renderCalendar();
  }, 15000);
});
</script>
</body>
</html>
